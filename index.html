<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무료 대출 상담 신청</title>
    <style>
        /* 기본 스타일 리셋 및 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7ff;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 메인 컨테이너 영역 */
        .container {
            width: 100%;
            max-width: 600px; /* 이미지 및 폼 너비 제한 */
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* 상단 이미지 영역 */
        .landing-img {
            width: 100%;
            display: block;
        }

        /* 입력 폼 컨테이너 */
        .form-container {
            padding: 40px 30px;
            background: linear-gradient(180deg, #ffffff 0%, #edf2ff 100%);
        }

        .form-title {
            font-size: 20px;
            font-weight: bold;
            color: #2b44ff;
            text-align: center;
            margin-bottom: 25px;
        }

        /* 입력 필드 그룹 */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #4e5968;
            margin-bottom: 8px;
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus, 
        .input-group select:focus {
            border-color: #2b44ff;
            box-shadow: 0 0 0 3px rgba(43, 68, 255, 0.1);
        }

        /* 개인정보 동의 약관 */
        .agreement-group {
            margin: 25px 0;
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #6b7280;
        }

        .agreement-group input {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 신청하기 버튼 */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #4d64ff, #2b44ff);
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(43, 68, 255, 0.3);
            transition: opacity 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="pr.png" alt="대출 한도 금리 무료 상담" class="landing-img">

        <div class="form-container">
            <div class="form-title">지금 바로 내 조건에 맞는 한도 확인하기</div>
            
            <!-- id를 부여하고 기존 action을 가로채기 위해 수정했습니다 -->
            <form id="loanConsultForm">
                <div class="input-group">
                    <label for="name">성함</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>

                <div class="input-group">
                    <label for="phone">전화번호</label>
                    <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" required>
                </div>

                <div class="input-group">
                    <label for="job">직업군</label>
                    <select id="job" name="job" required>
                        <option value="" disabled selected>직업을 선택해주세요</option>
                        <option value="직장인">직장인 (4대보험 가입)</option>
                        <option value="직장인_미가입">직장인 (4대보험 미가입)</option>
                        <option value="사업자">개인 사업자 / 법인 대표</option>
                        <option value="프리랜서">프리랜서 / 3.3% 원천징수</option>
                        <option value="주부">전업주부</option>
                        <option value="기타">기타 / 무직</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="amount">희망금액</label>
                    <input type="text" id="amount" name="amount" placeholder="예: 5,000만원 또는 500" required>
                </div>

                <div class="agreement-group">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">[필수] 무료 상담을 위한 개인정보 수집 및 이용에 동의합니다.</label>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">1분 간편 상담 신청하기</button>
            </form>
        </div>
    </div>

    <!-- 구글 시트 연동 비동기(Fetch) 스크립트 -->
    <script>
    document.getElementById('loanConsultForm').addEventListener('submit', function(e) {
        e.preventDefault(); // 폼이 제출될 때 페이지가 하얗게 이동하는 기본 행동 차단

        // 버튼 중복 클릭 방지 (데이터 전송 중 상태 표시)
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "전송 중입니다...";

        // ⚠️ 아래 큰따옴표 안을 구글 앱스 스크립트 배포 시 발급받은 실제 URL 주소(https://script.google.com/...)로 교체하세요!
        const actionUrl = "https://script.google.com/macros/s/AKfycbyqFirpKvVqA8LY3abjubBY9E4CVKPLrBQ0gsdJucFIBjv_Y659wbsbxobXB4VpuCM/exec"; 
        
        const formData = new FormData(this);

        // 구글 시트로 데이터 비동기(Background) 전송
        fetch(actionUrl, {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if(data.result === 'success') {
                alert('상담 신청이 정상적으로 완료되었습니다! 담당자가 곧 연락드리겠습니다.'); // 알림창 띄우기
                document.getElementById('loanConsultForm').reset(); // 작성 완료 후 폼 비우기
            } else {
                alert('오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
            }
        })
        .catch(error => {
            alert('전송 중 네트워크 에러가 발생했습니다.');
            console.error(error);
        })
        .finally(() => {
            // 전송 완료 후 버튼 원래 상태로 원복
            submitBtn.disabled = false;
            submitBtn.innerText = "1분 간편 상담 신청하기";
        });
    });
    </script>

</body>
</html>
