<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대출 한도 및 금리 무료 상담</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #f4f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 랜딩페이지 전체 컨테이너 (9:16 모바일 비율 타겟) */
        .landing-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* 모바일 최적화 해상도 */
            background-image: url('watermarked_img_12281784682240862406.png'); /* 방금 만든 파란색 배경 이미지 파일명 */
            background-size: cover;
            background-position: center;
            aspect-ratio: 9 / 16;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 입력창을 하단 빈 공간으로 배치 */
            padding: 30px 20px 40px 20px;
        }

        /* 입력 폼 컨테이너 (토스/카뱅 스타일의 깔끔한 흰색 박스) */
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
        }

        /* 2열 배치를 위한 그리드 시스템 */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        /* 모바일에서 세로로 길게 보고 싶다면 아래 주석을 해제하세요 */
        /* @media (max-width: 400px) {
            .input-grid { grid-template-columns: 1fr; }
        } */

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #4e5968; /* 토스풍 짙은 그레이 */
            margin-bottom: 6px;
            padding-left: 2px;
        }

        .input-group input, .input-group select {
            width: 100%;
            height: 48px;
            background-color: #f2f4f6;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 15px;
            color: #191f28;
            outline: none;
            transition: all 0.2s ease;
        }

        /* 입력창에 마우스 클릭/포커스 되었을 때 금융앱 스타일의 블루 테두리 */
        .input-group input:focus, .input-group select:focus {
            background-color: #ffffff;
            border-color: #3182f6; /* 신뢰감을 주는 리치 블루 */
            box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.12);
        }

        /* 금융 스타일의 꽉 찬 버튼 */
        .submit-btn {
            width: 100%;
            height: 54px;
            background-color: #3182f6;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 12px rgba(49, 130, 246, 0.2);
        }

        .submit-btn:hover {
            background-color: #1b64da;
        }

        /* 하단 개인정보 보호 안내 문구 */
        .privacy-notice {
            text-align: center;
            font-size: 11px;
            color: #8b95a1;
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="landing-container">
        <!-- SheetMonkey(시트몽키) 연동을 위한 form 태그 -->
        <form action="여기에_시트몽키_주소를_넣으세요" method="POST" class="form-container">
            
            <div class="input-grid">
                <!-- 1. 성함 -->
                <div class="input-group">
                    <label for="name">성함</label>
                    <input type="text" id="name" name="성함" placeholder="홍길동" required>
                </div>
                
                <!-- 2. 전화번호 -->
                <div class="input-group">
                    <label for="phone">전화번호</label>
                    <input type="tel" id="phone" name="전화번호" placeholder="010-1234-5678" required>
                </div>

                <!-- 3. 직업 (선택형 드롭다운으로 세련되게 처리) -->
                <div class="input-group">
                    <label for="job">직업군</label>
                    <select id="job" name="직업" required>
                        <option value="" disabled selected>선택해 주세요</option>
                        <option value="직장인">직장인 (4대보험)</option>
                        <option value="사업자">개인 사업자</option>
                        <option value="프리랜서">프리랜서 / 3.3%</option>
                        <option value="주부/무직">주부 / 기타</option>
                    </select>
                </div>

                <!-- 4. 필요금액 -->
                <div class="input-group">
                    <label for="amount">필요 금액</label>
                    <input type="text" id="amount" name="필요금액" placeholder="예: 500만원" required>
                </div>
            </div>

            <!-- 제출 버튼 -->
            <button type="submit" class="submit-btn">무료 한도 조회하기</button>

            <!-- 안심 보안 안내 -->
            <div class="privacy-notice">
                🔒 개인정보는 한도 조회 목적으로만 이용되며 안전하게 보호됩니다.
            </div>
        </form>
    </div>

</body>
</html>
